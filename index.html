<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta id="app-theme-color" name="theme-color" content="#f5f5f7" />
    <meta name="description" content="Mobile-first B flat trumpet notation, solfege, and fingering reflex trainer." />
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />
    <title>Trumpet Reflex Trainer</title>
    <style>
      .boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f5f5f7;
        color: #1d1d1f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 800;
      }

      html.dark .boot-fallback {
        background: #111113;
        color: #f4f4f5;
      }
    </style>
    <script>
      (() => {
        try {
          const stored = JSON.parse(localStorage.getItem("trumpet-reflex-settings-v1") || "{}");
          const theme = stored.theme || "system";
          const isDark = theme === "dark" || (theme === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
          document.getElementById("app-theme-color")?.setAttribute("content", isDark ? "#000000" : "#f5f5f7");
        } catch {
          // Theme hydration is best-effort; React will apply it again after mount.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <div class="boot-fallback">Trumpet Reflex is loading...</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
